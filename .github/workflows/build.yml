name: Build & Deploy CV

on:
  push:
    branches: [main]
  workflow_dispatch:       # lets you trigger a rebuild manually from the GitHub UI

permissions:
  contents: write          # needed to push docs/ back to the repo

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Commit & push docs/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          # Only commit if something actually changed
          git diff --cached --quiet || git commit -m "chore: rebuild site from content.yaml [skip ci]"
          git push
