research:
- icon: "🧠"
  title: "ML Model Compression"
  description: "Pruning, quantization (QaaS), and KAN networks to reduce the computational footprint of neural networks while preserving predictive accuracy for edge and IoT deployment."
- icon: "🌐"
  title: "Cloud-Edge Continuum"
  description: "Adaptive inference, FaaS architectures built on OpenFaaS + Kubernetes, and context-aware model distribution across cloud, edge, and IoT layers."
- icon: "🛸"
  title: "Orbital Federated Learning"
  description: "Extending federated learning paradigms to satellite and space-edge nodes — enabling privacy-preserving, energy-efficient, and verifiable AI in orbital environments."
- icon: "⛓️"
  title: "Blockchain for AI Certification"
  description: "Cryptographically verifiable AI pipelines, provenance tracking and immutable data certification. Every model inference — auditable and ethically accountable."
- icon: "📈"
  title: "AIOps & Telemetry Forecasting"
  description: "Temporal Transformer models pretrained on Azure VM data and fine-tuned on Alibaba container workloads for real-time CPU/GPU/memory prediction and anomaly detection."
- icon: "🏭"
  title: "Digital Manufacturing"
  description: "Decentralized architectures for pharmaceutical certification and industrial data traceability — from smart contract design to compliance-ready data exchange in regulated environments."

experience:
- period: "Nov 2025 – Present · Pisa, Italy"
  role: "National PhD Programme in AI for Society"
  place: "MUR — Universities of Messina & Pisa · EQF Level 8"
  description: "Researching cloud-edge AI, spatio-temporal forecasting, orbital federated learning, and blockchain-based certification of AI processes. Affiliated with FCRLab @ UniME."

- period: "Jul 2025 – Oct 2025 · Phoenix, USA"
  role: "Blockchain Architect"
  place: "International research collaboration"
  description: "Designed and implemented blockchain integration within a real-time pharmaceutical production environment, enhancing traceability, data integrity and process transparency across complex workflows.
    Built decentralized architectures and smart contracts for secure, compliant, and auditable data exchange in regulated settings."

- period: "Mar 2025 – Oct 2025 · Messina, Italy"
  role: "Research Fellow — European Project Neurokit2E"
  place: "University of Messina, FCRLab"
  description: "Scientific research on ML for edge/embedded devices: quantization, pruning (PyTorch, TensorFlow-Keras), anomaly detection via Transformer models and KAN (Kolmogorov–Arnold Networks)."

- period: "Jul 2024 – Present · Boston, USA"
  role: "Blockchain Developer / Architect"
  place: "Circular Protocol"
  description: "Designed the SDK (Java, PHP, Python, JS/Node.js) for the Circular Protocol Layer 1 blockchain, enabling transaction management, smart contract lifecycle, on-chain read/write and network
    monitoring. Contributed to decentralized architecture design for dApp integration and traditional backend systems. Built iStamp.app — a web portal for blockchain-based data notarization and timestamping
    with cryptographic hash, digital signature, and public verification."

- period: "Mar 2024 – Aug 2024 · Messina, Italy"
  role: "Research Fellow — Smart Cities & MaaS"
  place: "University of Messina, FCRLab"
  description: "Distributed deployment of SQL/NoSQL databases with Docker and Kubernetes, backend/frontend (Drupal), API development in Go and PHP, and Flutter mobile app maintenance for public transportation
    MaaS systems."

- period: "2023 – 2025 · Messina, Italy"
  role: "MSc in Data Science — 110/110 Cum Laude"
  place: "University of Messina · EQF Level 7"
  description: "Thesis: *Real-time digital regulatory approval framework for Agile Pharmaceutical Manufacturing using AI and Blockchain.* Courses: Advanced ML, Big Data, Blockchain & Data Security, HPC,
    Bio-inspired AI, Bioinformatics."

- period: "Oct 2022 – Jan 2023 · Messina, Italy"
  role: "Curricular Internship"
  place: "University of Messina — MIFT Department"
  description: "Project: Collision detection and prevention systems for autonomous robotic machines."

- period: "Oct 2018 – Aug 2022 · Messina, Italy"
  role: "Fullstack Developer & Project Manager"
  place: "Mifra SRL"
  description: "Led a small IT division. Stack: Swift/SwiftUI (iOS), Laravel/PHP, JavaScript, MySQL, MongoDB, Python, Bash on Raspberry Pi, Docker, Kubernetes, VMware ESXi. Managed team coordination via
    Slack, JetBrains Space, Nextcloud."

- period: "2020 – 2023 · Messina, Italy"
  role: "BSc in Computer Science — 108/110"
  place: "University of Messina · EQF Level 6"
  description: "Thesis: *Reinforcement Learning for autonomous driving — comparison of PPO, DQN and DDQN in 2D and 3D environments.* Courses: AI, OOP, Distributed Systems, Networks, Algorithms & Data Structures,
    OS, Web & Mobile."

