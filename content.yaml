about:
  bio:
  - "I'm a **PhD Student in Artificial Intelligence for Society** at the Universities of Messina and Pisa (National PhD Programme in AI, MUR), affiliated with the **Future Computing Research Laboratory
    (FCRLab)** at UniME."
  - "I hold an **MSc in Data Science (110/110 cum laude)** and a **BSc in Computer Science (108/110)**, both from the University of Messina. My MSc thesis introduced a real-time digital regulatory approval
    framework for Agile Pharmaceutical Manufacturing using AI and Blockchain."
  - "My research lives at the crossroads of machine learning optimization, blockchain-based data certification, and trustworthy AI. I'm currently extending this work toward **Orbital Federated Learning**
    — applying distributed learning paradigms to satellite and space-edge nodes to enable verifiable AI in constrained orbital environments."
  - "In 2025 this work was funded by the European project **Neurokit2E**. I also collaborate with **Circular Protocol** (Boston) on blockchain certification for decentralised manufacturing workflows."
  - "Born 29 Aug 2000. Based in Messina, Italy. Drone pilot (EU A1/A3). Pianist and guitarist."
